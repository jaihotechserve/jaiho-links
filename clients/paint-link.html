<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paint Link's official digital links, managed by Jaiho Links. Explore our portfolio, services, and contact information.">
    <title>Paint Link | Jaiho Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            background: var(--bg-light-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .link-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 4rem 1.5rem 2rem;
            flex: 1;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .profile-avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: var(--shadow-lg);
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        /* Paint Link Specific Branding */
        .profile-icon {
            font-size: 3rem;
            color: var(--primary-color);
        }

        .profile-title {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .profile-bio {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-main);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.05rem;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .link-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .link-btn.priority {
            background: var(--brand-gradient);
            color: #ffffff;
            border: none;
        }

        .link-btn.priority:hover {
            background: var(--brand-gradient-hover);
            color: #ffffff;
            box-shadow: var(--shadow-glow);
        }

        .link-btn.priority .link-icon {
            color: #ffffff;
        }

        .link-icon {
            font-size: 1.4rem;
            width: 35px;
            text-align: center;
            color: var(--primary-color);
            transition: all var(--transition-normal);
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            padding-right: 35px;
        }

        .share-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-normal);
            z-index: 10;
        }

        .share-btn:hover {
            background: var(--bg-surface-alt);
            color: var(--primary-color);
            transform: scale(1.05);
        }

        .jaiho-watermark {
            text-align: center;
            padding: 2rem 0;
            margin-top: auto;
            position: relative;
            z-index: 1;
        }

        .watermark-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .watermark-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="blob blob-1" style="top: -10%; left: -20%; opacity: 0.3; width: 400px; height: 400px; position: fixed;"></div>

    <div class="share-btn" onclick="navigator.share({title: 'Paint Link | Jaiho Links', url: window.location.href})" aria-label="Share this profile">
        <i class="fas fa-share-nodes"></i>
    </div>

    <main class="link-container">
        
        <header class="profile-header">
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar">
                    <i class="fas fa-paint-roller profile-icon"></i>
                </div>
            </div>
            <h1 class="profile-title">Paint Link</h1>
            <p class="profile-bio">Premier creative and design services. We bring high-quality visual aesthetics, color solutions, and creative direction to your brand.</p>
        </header>

        <nav class="links-wrapper">
            
            <a href="#" class="link-btn priority" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-palette link-icon"></i>
                <span class="link-text">Explore Our Portfolio</span>
            </a>

            <a href="https://jaiholabs.w3spaces.com" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-unlock-keyhole link-icon"></i>
                <span class="link-text">Noritsu Color Lab Passwords</span>
            </a>

            <a href="#" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram link-icon"></i>
                <span class="link-text">Follow our Designs on Instagram</span>
            </a>

            <a href="#" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp link-icon"></i>
                <span class="link-text">Chat with our Design Team</span>
            </a>

            <a href="#" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-location-dot link-icon"></i>
                <span class="link-text">Visit Our Studio</span>
            </a>

        </nav>
    </main>

    <footer class="jaiho-watermark">
        <a href="../index.html" class="watermark-link">
            Powered by 
            <i class="fas fa-link watermark-icon brand-gradient" style="-webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i> 
            Jaiho Links
        </a>
    </footer>

</body>
</html>
